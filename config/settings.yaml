#
#  Currency Intelligence Platform - Settings
#
project:
  name: currency-intelligence
  version: "1.0.0"
  timezone: UTC
currencies:
  base: USD
  targets:
    - EUR
    - SEK
    - GBP
    - NOK
api:
  # Primary: Frankfurter (ECB data, free, no key, historical back to 1999)
  provider: frankfurter
  base_url: "https://api.frankfurter.app"
  timeout_seconds: 30
  retry_attempts: 3
  retry_backoff_seconds: 5
paths:
  raw: data/raw
  bronze: data/bronze
  silver: data/silver
  gold: data/gold
  forecasts: data/forecasts
  warehouse: data/warehouse
  logs: logs
spark:
  app_name: CurrencyIntelligence
  master: local[*]
  shuffle_partitions: 4
  log_level: WARN
  configs:
    spark.sql.parquet.compression.codec: snappy
    spark.sql.session.timeZone: UTC
silver:
  min_valid_rate: 0.000001
  max_valid_rate: 100000.0
gold:
  rolling_windows:
    - 7
    - 30
    - 90
  volatility_window: 30
ml:
  forecast_horizon_days: 30
  prophet:
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0
    interval_width: 0.95
  min_training_rows: 30
warehouse:
  db_file: data/warehouse/currency_intelligence.duckdb
  tables:
    exchange_rates: gold_exchange_rates
    analytics: gold_analytics
    forecasts: ml_forecasts
